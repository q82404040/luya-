<!DOCTYPE html>
<html>
<body style="margin:0;display:flex;font-family:sans-serif;background:#f3f3f3">

<div style="width:320px;background:#fff;padding:10px;border-right:1px solid #ddd;height:100vh;overflow:auto">

<h3>罗盘工具</h3>

<button onclick="addLayer()" style="width:100%">➕ 添加层</button>

<div id="layersUI"></div>

<hr>

<button onclick="save()">保存</button>
<button onclick="load()">读取</button>
<button onclick="exportImg()">导出</button>

</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c")
const x=c.getContext("2d")
c.width=800
c.height=800

// 每层厚度（核心）
const layerWidth = 40

let state={
layers:[
{n:8,data:"乾,兑,离,震,巽,坎,艮,坤",size:16,color:"#000"},
{n:24,data:"子,癸,丑,艮,寅,甲,卯,乙,辰,巽,巳,丙,午,丁,未,坤,申,庚,酉,辛,戌,乾,亥,壬",size:12,color:"#000"}
]
}

// 添加层
function addLayer(){
state.layers.push({n:12,data:"",size:12,color:"#000"})
buildUI()
}

// 删除层
function removeLayer(i){
state.layers.splice(i,1)
buildUI()
}

// UI
function buildUI(){
const box=document.getElementById("layersUI")
box.innerHTML=""

state.layers.forEach((l,i)=>{
box.innerHTML+=`
<div style="border:1px solid #ddd;border-radius:6px;padding:8px;margin:10px 0;background:#fafafa">
<b>第${i+1}层</b>
<button onclick="removeLayer(${i})" style="float:right">删除</button>

<br>分割 <input value="${l.n}" onchange="state.layers[${i}].n=this.value">

<br>字体 <input value="${l.size}" onchange="state.layers[${i}].size=this.value">
<br>颜色 <input value="${l.color}" onchange="state.layers[${i}].color=this.value">

<br>文字
<textarea style="width:100%" onchange="state.layers[${i}].data=this.value">${l.data}</textarea>
</div>
`
})
}

buildUI()

// 旋转
let r=0,v=0,d=false,last=0

c.onmousedown=e=>{
d=true
last=Math.atan2(e.offsetY-400,e.offsetX-400)
}
window.onmouseup=()=>d=false
window.onmousemove=e=>{
if(!d)return
let a=Math.atan2(e.offsetY-400,e.offsetX-400)
v=a-last
r+=v
last=a
}

// 绘制（自动向外扩展）
function draw(){
requestAnimationFrame(draw)

if(!d){r+=v;v*=0.95}

x.clearRect(0,0,800,800)

x.save()
x.translate(400,400)
x.rotate(r)
x.translate(-400,-400)

let inner = 80  // 起始半径

state.layers.forEach((l,i)=>{
let outer = inner + layerWidth

let arr=l.data.split(",")
let step=Math.PI*2/l.n

x.strokeStyle="#000"
x.fillStyle=l.color
x.font=l.size+"px sans-serif"

// 分割线
for(let j=0;j<l.n;j++){
let a=j*step-Math.PI/2

x.beginPath()
x.moveTo(
400+Math.cos(a)*inner,
400+Math.sin(a)*inner
)
x.lineTo(
400+Math.cos(a)*outer,
400+Math.sin(a)*outer
)
x.stroke()

// 文字
let mid=(inner+outer)/2
let tx=400+Math.cos(a+step/2)*mid
let ty=400+Math.sin(a+step/2)*mid

x.textAlign="center"
x.textBaseline="middle"
x.fillText(arr[j]||"",tx,ty)
}

// 圆环
x.beginPath()
x.arc(400,400,outer,0,Math.PI*2)
x.stroke()

inner = outer
})

x.restore()

// 指针
x.fillStyle="#000"
x.beginPath()
x.moveTo(400,60)
x.lineTo(390,90)
x.lineTo(410,90)
x.fill()

// 角度
let deg=(( -r*180/Math.PI)+360)%360
x.fillText(deg.toFixed(1)+"°",400,420)
}

draw()

// 存储
function save(){
localStorage.setItem("tool",JSON.stringify(state))
alert("已保存")
}
function load(){
state=JSON.parse(localStorage.getItem("tool"))
buildUI()
}

// 导出
function exportImg(){
let a=document.createElement("a")
a.href=c.toDataURL()
a.download="罗盘.png"
a.click()
}
</script>

</body>
</html>
