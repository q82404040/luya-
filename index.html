<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{margin:0;display:flex;height:100vh;background:#1e1e1e;font-family:sans-serif}
.panel{width:260px;background:#2b2b2b;padding:10px;color:#fff}
.btn{width:100%;padding:8px;margin:4px 0;background:#444;border:none;color:#fff;border-radius:6px}
.canvasBox{flex:1;display:flex;align-items:center;justify-content:center}
</style>
</head>

<body>

<div class="panel">
<h3>罗盘工具（商业版）</h3>
<button class="btn" onclick="addLayer()">添加层</button>
<button class="btn" onclick="exportPNG()">导出PNG</button>
</div>

<div class="canvasBox">
<canvas id="c"></canvas>
</div>

<script>
const c=document.getElementById("c")
const ctx=c.getContext("2d")
c.width=900
c.height=900

let scale=1
let rotation=0
let offsetX=0
let offsetY=0

let dragging=false
let rotating=false

let selected=null

let state={
layers:[
{n:8,data:"乾,兑,离,震,巽,坎,艮,坤",w:60},
{n:24,data:"子,癸,丑,艮,寅,甲,卯,乙,辰,巽,巳,丙,午,丁,未,坤,申,庚,酉,辛,戌,乾,亥,壬",w:50}
]
}

// ===== 字体自适应 =====
function fitFontSize(ctx,text,maxWidth,maxHeight){
let size=maxHeight
ctx.font=size+"px serif"
while(size>5){
if(ctx.measureText(text).width<=maxWidth) break
size--
ctx.font=size+"px serif"
}
return size
}

// ===== 交互 =====
c.onwheel=e=>{
e.preventDefault()
scale *= e.deltaY<0?1.1:0.9
}

c.onmousedown=e=>{
if(e.button===2){
rotating=true
}else{
dragging=true
}
}

window.onmouseup=()=>{
dragging=false
rotating=false
}

window.onmousemove=e=>{
if(dragging){
offsetX+=e.movementX
offsetY+=e.movementY
}
if(rotating){
rotation+=e.movementX*0.01
}
}

// 禁止右键菜单
c.oncontextmenu=e=>e.preventDefault()

// ===== 点击选中 =====
c.onclick=e=>{
let x0=(e.offsetX-450-offsetX)/scale
let y0=(e.offsetY-450-offsetY)/scale

let dist=Math.sqrt(x0*x0+y0*y0)
let angle=Math.atan2(y0,x0)
if(angle<0) angle+=Math.PI*2

let inner=80

state.layers.forEach((l,li)=>{
let outer=inner+l.w
if(dist>inner && dist<outer){
let step=2*Math.PI/l.n
let idx=Math.floor(angle/step)
selected={layer:li,index:idx}
}
inner=outer
})
}

// ===== 绘制 =====
function draw(){
requestAnimationFrame(draw)

ctx.clearRect(0,0,900,900)

// 白底
ctx.fillStyle="#fff"
ctx.fillRect(0,0,900,900)

ctx.save()

ctx.translate(450+offsetX,450+offsetY)
ctx.scale(scale,scale)
ctx.rotate(rotation)

// ===== 刻度环 =====
ctx.strokeStyle="#000"
for(let i=0;i<360;i+=10){
let a=i*Math.PI/180
let r1=360
let r2=i%30==0?380:370

ctx.beginPath()
ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1)
ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2)
ctx.stroke()

if(i%90==0){
ctx.fillText(i+"°",Math.cos(a)*400,Math.sin(a)*400)
}
}

// ===== 罗盘 =====
let inner=80

ctx.beginPath()
ctx.arc(0,0,inner,0,Math.PI*2)
ctx.stroke()

state.layers.forEach((l,li)=>{
let outer=inner+l.w
let arr=l.data.split(",")
let step=2*Math.PI/l.n

for(let i=0;i<l.n;i++){
let a=i*step

// 高亮
if(selected && selected.layer===li && selected.index===i){
ctx.fillStyle="rgba(255,0,0,0.2)"
ctx.beginPath()
ctx.arc(0,0,outer,a,a+step)
ctx.arc(0,0,inner,a+step,a,true)
ctx.fill()
}

// 分割线
ctx.beginPath()
ctx.moveTo(Math.cos(a)*inner,Math.sin(a)*inner)
ctx.lineTo(Math.cos(a)*outer,Math.sin(a)*outer)
ctx.stroke()

// ===== 字号自动填满 =====
let text=arr[i]||""
let mid=(inner+outer)/2
let arcLen=step*mid
let ringH=outer-inner

let size=fitFontSize(ctx,text,arcLen*0.9,ringH*0.9)
ctx.font=size+"px serif"

// 文字
ctx.save()
ctx.translate(Math.cos(a+step/2)*mid,Math.sin(a+step/2)*mid)
ctx.rotate(a+step/2+Math.PI/2)
ctx.textAlign="center"
ctx.textBaseline="middle"
ctx.fillStyle="#000"
ctx.fillText(text,0,0)
ctx.restore()
}

ctx.beginPath()
ctx.arc(0,0,outer,0,Math.PI*2)
ctx.stroke()

inner=outer
})

ctx.restore()
}

draw()

// ===== 导出 =====
function exportPNG(){
let a=document.createElement("a")
a.href=c.toDataURL("image/png")
a.download="罗盘.png"
a.click()
}

function addLayer(){
state.layers.push({n:12,data:"",w:50})
}
</script>

</body>
</html>
