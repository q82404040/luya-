<!DOCTYPE html>
<html>
<body style="margin:0;display:flex;font-family:sans-serif;background:#f5f5f5">

<!-- 左侧 -->
<div style="width:320px;padding:12px;background:#fff;border-right:1px solid #ddd;overflow:auto;height:100vh">

<h3>罗盘制作工具</h3>

<button onclick="addLayer()" style="width:100%;margin-bottom:10px">➕ 添加层</button>

<div id="layersUI"></div>

<hr>

<button onclick="save()" style="width:48%">保存</button>
<button onclick="load()" style="width:48%">读取</button>

<hr>

<button onclick="exportImg()" style="width:100%">导出图片</button>

</div>

<!-- 画布 -->
<canvas id="c"></canvas>

<script>
const c=document.getElementById("c")
const x=c.getContext("2d")
c.width=800;c.height=800

let state={
layers:[
{n:8,r:300,data:"乾,兑,离,震,巽,坎,艮,坤"},
{n:24,r:250,data:"子,癸,丑,艮,寅,甲,卯,乙,辰,巽,巳,丙,午,丁,未,坤,申,庚,酉,辛,戌,乾,亥,壬"}
]
}

function addLayer(){
state.layers.push({n:12,r:200,data:""})
buildUI()
}

function removeLayer(i){
state.layers.splice(i,1)
buildUI()
}

function buildUI(){
const box=document.getElementById("layersUI")
box.innerHTML=""

state.layers.forEach((l,i)=>{
box.innerHTML+=`
<div style="background:#fafafa;border:1px solid #ddd;border-radius:8px;padding:8px;margin-bottom:10px">
<b>第${i+1}层</b>
<button onclick="removeLayer(${i})" style="float:right">删除</button>

<br>分割：
<input value="${l.n}" onchange="state.layers[${i}].n=this.value">

<br>半径：
<input value="${l.r}" onchange="state.layers[${i}].r=this.value">

<br>文字：
<textarea style="width:100%" onchange="state.layers[${i}].data=this.value">${l.data}</textarea>
</div>
`
})
}

buildUI()

let r=0,v=0,d=false,last=0

c.onmousedown=e=>{
d=true
last=Math.atan2(e.offsetY-400,e.offsetX-400)
}
window.onmouseup=()=>d=false
window.onmousemove=e=>{
if(!d)return
let a=Math.atan2(e.offsetY-400,e.offsetX-400)
v=a-last
r+=v
last=a
}

function draw(){
requestAnimationFrame(draw)
if(!d){r+=v;v*=0.95}

x.clearRect(0,0,800,800)

x.save()
x.translate(400,400)
x.rotate(r)
x.translate(-400,-400)

state.layers.forEach(l=>{
let arr=l.data.split(",")
let step=Math.PI*2/l.n

for(let i=0;i<l.n;i++){
let a=i*step-Math.PI/2

x.beginPath()
x.moveTo(400,400)
x.lineTo(400+Math.cos(a)*l.r,400+Math.sin(a)*l.r)
x.stroke()

let tx=400+Math.cos(a+step/2)*(l.r-20)
let ty=400+Math.sin(a+step/2)*(l.r-20)

x.fillText(arr[i]||"",tx,ty)
}

x.beginPath()
x.arc(400,400,l.r,0,Math.PI*2)
x.stroke()
})

x.restore()

// 指针
x.beginPath()
x.moveTo(400,60)
x.lineTo(390,90)
x.lineTo(410,90)
x.fill()

// 角度
let deg=(( -r*180/Math.PI)+360)%360
x.fillText(deg.toFixed(1)+"°",400,420)
}

draw()

function save(){
localStorage.setItem("tool",JSON.stringify(state))
alert("已保存")
}

function load(){
state=JSON.parse(localStorage.getItem("tool"))
buildUI()
}

function exportImg(){
let a=document.createElement("a")
a.href=c.toDataURL()
a.download="罗盘.png"
a.click()
}
</script>

</body>
</html>
