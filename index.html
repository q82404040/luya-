<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{margin:0;display:flex;height:100vh;background:#1e1e1e;font-family:sans-serif}
.panel{width:320px;background:#2b2b2b;padding:10px;color:#fff;overflow:auto}
.btn{width:100%;padding:8px;margin:4px 0;background:#444;border:none;color:#fff;border-radius:6px;cursor:pointer}
textarea{width:100%;margin-top:5px;background:#222;color:#fff;border:1px solid #555}
.palette{display:flex;gap:6px;margin:6px 0}
.color{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid #666}
.canvasBox{flex:1;display:flex;align-items:center;justify-content:center}
</style>
</head>

<body>

<div class="panel">
<h3>陆压罗盘</h3>
<button class="btn" onclick="addLayer()">添加层</button>
<div id="layersUI"></div>
<button class="btn" onclick="exportPNG()">导出PNG</button>
</div>

<div class="canvasBox">
<canvas id="c"></canvas>
</div>

<script>
const c=document.getElementById("c")
const ctx=c.getContext("2d")

// ===== 高清 =====
const DPR = window.devicePixelRatio || 1
c.width = 900 * DPR
c.height = 900 * DPR
c.style.width = "900px"
c.style.height = "900px"
ctx.scale(DPR, DPR)

ctx.imageSmoothingEnabled = true
ctx.imageSmoothingQuality = "high"

// ===== 状态 =====
let scale=1
let rotation=0
let rotating=false
let lastAngle=0
let selected=null

const palette=["#000","#c0392b","#2980b9","#27ae60","#f39c12","#8e44ad"]

let state={
layers:[
{n:8,data:"乾,兑,离,震,巽,坎,艮,坤",w:60,color:"#000"},
{n:24,data:"子,癸,丑,艮,寅,甲,卯,乙,辰,巽,巳,丙,午,丁,未,坤,申,庚,酉,辛,戌,乾,亥,壬",w:50,color:"#000"}
]
}

// ===== UI =====
function buildUI(){
let box=document.getElementById("layersUI")
box.innerHTML=""
state.layers.forEach((l,i)=>{
let colors=""
palette.forEach(col=>{
colors+=`<div class="color" style="background:${col}" onclick="setColor(${i},'${col}')"></div>`
})
box.innerHTML+=`
<div style="background:#333;padding:8px;margin:8px 0;border-radius:6px">
<b>第${i+1}层</b>
<button onclick="removeLayer(${i})" style="float:right">✖</button>
<br>分割 <input value="${l.n}" onchange="updateLayer(${i},'n',this.value)">
<br>厚度 <input value="${l.w}" onchange="updateLayer(${i},'w',this.value)">
<div class="palette">${colors}</div>
<textarea onchange="updateLayer(${i},'data',this.value)">${l.data}</textarea>
</div>`
})
}
function updateLayer(i,key,val){state.layers[i][key]=key==="data"?val:Number(val)}
function setColor(i,col){state.layers[i].color=col}
function addLayer(){state.layers.push({n:12,data:"",w:50,color:"#000"});buildUI()}
function removeLayer(i){state.layers.splice(i,1);buildUI()}
buildUI()

// ===== 交互 =====
c.onwheel=e=>{e.preventDefault();scale*=e.deltaY<0?1.1:0.9}
c.onmousedown=e=>{rotating=true;lastAngle=Math.atan2(e.offsetY-450,e.offsetX-450)}
window.onmouseup=()=>rotating=false
window.onmousemove=e=>{
if(!rotating)return
let a=Math.atan2(e.offsetY-450,e.offsetX-450)
rotation+=a-lastAngle
lastAngle=a
}

// ===== 点击 =====
c.onclick=e=>{
let x=e.offsetX-450
let y=e.offsetY-450
let cos=Math.cos(-rotation),sin=Math.sin(-rotation)
let rx=x*cos-y*sin,ry=x*sin+y*cos
let dist=Math.sqrt(rx*rx+ry*ry)
let angle=Math.atan2(ry,rx)
if(angle<0)angle+=Math.PI*2
let inner=80,found=false
state.layers.forEach((l,li)=>{
let outer=inner+l.w
if(dist>inner*scale&&dist<outer*scale){
let step=2*Math.PI/l.n
selected={layer:li,index:Math.floor(angle/step)}
found=true}
inner=outer})
if(!found)selected=null
}

// ===== 绘制 =====
function draw(){
requestAnimationFrame(draw)
ctx.clearRect(0,0,900,900)

ctx.fillStyle="#fff"
ctx.fillRect(0,0,900,900)

ctx.save()
ctx.translate(450,450)
ctx.scale(scale,scale)
ctx.rotate(rotation)

let inner=80

ctx.beginPath()
ctx.arc(0,0,inner,0,Math.PI*2)
ctx.stroke()

state.layers.forEach((l,li)=>{
let outer=inner+l.w
let arr=l.data.split(",")
let step=2*Math.PI/l.n

for(let i=0;i<l.n;i++){
let a=i*step
let mid=a+step/2

// 高亮
if(selected && selected.layer===li && selected.index===i){
ctx.fillStyle="rgba(255,0,0,0.2)"
ctx.beginPath()
ctx.arc(0,0,outer,a,a+step)
ctx.arc(0,0,inner,a+step,a,true)
ctx.fill()
}

// 分割线
ctx.strokeStyle="#000"
ctx.beginPath()
ctx.moveTo(Math.cos(a)*inner,Math.sin(a)*inner)
ctx.lineTo(Math.cos(a)*outer,Math.sin(a)*outer)
ctx.stroke()

// ===== 外→内弧形文字（优化版）=====
let text=arr[i]||""
let chars=text.split("")
let height=outer-inner
let gap=height/(chars.length+1)

let size=Math.min(gap*0.85, step*((inner+outer)/2)*0.65)

ctx.font=size+"px Microsoft YaHei, PingFang SC, Heiti SC, sans-serif"
ctx.fillStyle=l.color
ctx.strokeStyle="rgba(0,0,0,0.35)"
ctx.lineWidth=size*0.03

for(let j=0;j<chars.length;j++){
let r=outer-gap*(j+1)

ctx.save()
ctx.translate(Math.cos(mid)*r,Math.sin(mid)*r)
ctx.rotate(mid+Math.PI/2)
ctx.textAlign="center"
ctx.textBaseline="middle"

ctx.strokeText(chars[j],0,0)
ctx.fillText(chars[j],0,0)

ctx.restore()
}

}

ctx.beginPath()
ctx.arc(0,0,outer,0,Math.PI*2)
ctx.stroke()

inner=outer
})

ctx.restore()
}

draw()

function exportPNG(){
let a=document.createElement("a")
a.href=c.toDataURL("image/png")
a.download="罗盘.png"
a.click()
}
</script>

</body>
</html>
