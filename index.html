<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{margin:0;display:flex;height:100vh;background:#1e1e1e;font-family:sans-serif}

.panel{width:280px;background:#2b2b2b;padding:10px;color:#fff}
.btn{width:100%;padding:8px;margin:4px 0;background:#444;border:none;color:#fff;border-radius:6px}

.canvasBox{flex:1;display:flex;align-items:center;justify-content:center}
</style>
</head>

<body>

<div class="panel">
<h3>罗盘工具</h3>
<button class="btn" onclick="addLayer()">添加层</button>
<button class="btn" onclick="exportPNG()">导出</button>
</div>

<div class="canvasBox">
<canvas id="c"></canvas>
</div>

<script>
const c=document.getElementById("c")
const x=c.getContext("2d")
c.width=900
c.height=900

let scale=1
let rotation=0
let offsetX=0
let offsetY=0

let dragging=false
let rotating=false

let selected=null

let state={
layers:[
{n:8,data:"乾,兑,离,震,巽,坎,艮,坤",w:60},
{n:24,data:"子,癸,丑,艮,寅,甲,卯,乙,辰,巽,巳,丙,午,丁,未,坤,申,庚,酉,辛,戌,乾,亥,壬",w:50}
]
}

function addLayer(){
state.layers.push({n:12,data:"",w:50})
}

// ===== 缩放 =====
c.onwheel=e=>{
e.preventDefault()
scale *= e.deltaY<0 ? 1.1 : 0.9
}

// ===== 鼠标 =====
c.onmousedown=e=>{
if(e.button===2){
rotating=true
}else{
dragging=true
}
}
window.onmouseup=()=>{dragging=false;rotating=false}

window.onmousemove=e=>{
if(dragging){
offsetX += e.movementX
offsetY += e.movementY
}
if(rotating){
rotation += e.movementX*0.01
}
}

// ===== 点击选中 =====
c.onclick=e=>{
let dx=e.offsetX-450-offsetX
let dy=e.offsetY-450-offsetY
let dist=Math.sqrt(dx*dx+dy*dy)

let angle=Math.atan2(dy,dx)+Math.PI/2
if(angle<0) angle+=Math.PI*2

let inner=80

state.layers.forEach((l,li)=>{
let outer=inner+l.w
if(dist>inner*scale && dist<outer*scale){
let step=2*Math.PI/l.n
let index=Math.floor(angle/step)
selected={layer:li,index}
}
inner=outer
})
}

// ===== 绘制 =====
function draw(){
requestAnimationFrame(draw)

x.clearRect(0,0,900,900)

// 白底
x.fillStyle="#fff"
x.fillRect(0,0,900,900)

x.save()

x.translate(450+offsetX,450+offsetY)
x.scale(scale,scale)
x.rotate(rotation)

// ===== 刻度环 =====
for(let i=0;i<360;i+=10){
let a=i*Math.PI/180
let r1=350
let r2=i%30==0?370:360

x.beginPath()
x.moveTo(Math.cos(a)*r1,Math.sin(a)*r1)
x.lineTo(Math.cos(a)*r2,Math.sin(a)*r2)
x.stroke()

if(i%90==0){
x.fillText(i+"°",Math.cos(a)*390,Math.sin(a)*390)
}
}

// ===== 罗盘 =====
let inner=80

state.layers.forEach((l,li)=>{
let outer=inner+l.w
let arr=l.data.split(",")
let step=2*Math.PI/l.n

for(let i=0;i<l.n;i++){
let a=i*step

// 高亮选中
if(selected && selected.layer===li && selected.index===i){
x.fillStyle="rgba(255,0,0,0.2)"
x.beginPath()
x.arc(0,0,outer,a,a+step)
x.arc(0,0,inner,a+step,a,true)
x.fill()
}

// 分割线
x.beginPath()
x.moveTo(Math.cos(a)*inner,Math.sin(a)*inner)
x.lineTo(Math.cos(a)*outer,Math.sin(a)*outer)
x.stroke()

// 文字
let mid=(inner+outer)/2
x.save()
x.translate(Math.cos(a+step/2)*mid,Math.sin(a+step/2)*mid)
x.rotate(a+step/2+Math.PI/2)
x.fillText(arr[i]||"",0,0)
x.restore()
}

x.beginPath()
x.arc(0,0,outer,0,Math.PI*2)
x.stroke()

inner=outer
})

x.restore()
}

draw()

function exportPNG(){
let url=c.toDataURL()
let a=document.createElement("a")
a.href=url
a.download="罗盘.png"
a.click()
}
</script>

</body>
</html>
