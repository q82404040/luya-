<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{margin:0;display:flex;height:100vh;font-family:sans-serif;background:#1e1e1e;color:#eee}

.panel{width:320px;background:#2b2b2b;padding:10px;overflow:auto;border-right:1px solid #444}

.btn{width:100%;padding:8px;margin:4px 0;background:#3a3a3a;border:none;color:#fff;border-radius:6px;cursor:pointer}
.btn:hover{background:#555}

.card{background:#333;padding:8px;margin-bottom:10px;border-radius:8px}

input,textarea{
width:100%;
margin:3px 0;
background:#222;
border:1px solid #555;
color:#fff;
border-radius:4px;
padding:4px;
}

label{font-size:12px;color:#aaa}

.canvasBox{flex:1;display:flex;align-items:center;justify-content:center;background:#111}
</style>
</head>

<body>

<div class="panel">

<h3>罗盘设计工具</h3>

<button class="btn" onclick="addLayer()">➕ 添加层</button>

<div id="layersUI"></div>

<hr>

<button class="btn" onclick="save()">💾 保存</button>
<button class="btn" onclick="load()">📂 读取</button>
<button class="btn" onclick="exportImg()">📤 导出图片</button>

</div>

<div class="canvasBox">
<canvas id="c"></canvas>
</div>

<script>
const c=document.getElementById("c")
const x=c.getContext("2d")
c.width=900
c.height=900

const layerWidth=50

let state={
layers:[
{n:8,data:"乾,兑,离,震,巽,坎,艮,坤",size:18,color:"#000000"},
{n:24,data:"子,癸,丑,艮,寅,甲,卯,乙,辰,巽,巳,丙,午,丁,未,坤,申,庚,酉,辛,戌,乾,亥,壬",size:12,color:"#000000"}
]
}

// UI
function buildUI(){
const box=document.getElementById("layersUI")
box.innerHTML=""

state.layers.forEach((l,i)=>{
box.innerHTML+=`
<div class="card">
<b>第${i+1}层</b>
<button onclick="removeLayer(${i})" style="float:right">✖</button>

<label>分割</label>
<input value="${l.n}" onchange="state.layers[${i}].n=this.value">

<label>字体大小</label>
<input value="${l.size}" onchange="state.layers[${i}].size=this.value">

<label>文字颜色</label>
<input type="color" value="${l.color}" onchange="state.layers[${i}].color=this.value">

<label>文字</label>
<textarea onchange="state.layers[${i}].data=this.value">${l.data}</textarea>
</div>
`
})
}

buildUI()

function addLayer(){
state.layers.push({n:12,data:"",size:12,color:"#000000"})
buildUI()
}

function removeLayer(i){
state.layers.splice(i,1)
buildUI()
}

// 旋转
let r=0,v=0,d=false,last=0

c.onmousedown=e=>{
d=true
last=Math.atan2(e.offsetY-450,e.offsetX-450)
}
window.onmouseup=()=>d=false
window.onmousemove=e=>{
if(!d)return
let a=Math.atan2(e.offsetY-450,e.offsetX-450)
v=a-last
r+=v
last=a
}

// 绘制
function draw(){
requestAnimationFrame(draw)

if(!d){r+=v;v*=0.95}

x.clearRect(0,0,900,900)

// 中心点
x.beginPath()
x.arc(450,450,8,0,Math.PI*2)
x.fillStyle="#000"
x.fill()

x.save()
x.translate(450,450)
x.rotate(r)
x.translate(-450,-450)

let inner=80

state.layers.forEach((l,i)=>{
let outer=inner+layerWidth

let arr=l.data.split(",")
let step=Math.PI*2/l.n

x.strokeStyle="#000"
x.fillStyle=l.color
x.font=l.size+"px serif"

// 分割线
for(let j=0;j<l.n;j++){
let a=j*step-Math.PI/2

x.beginPath()
x.moveTo(450+Math.cos(a)*inner,450+Math.sin(a)*inner)
x.lineTo(450+Math.cos(a)*outer,450+Math.sin(a)*outer)
x.stroke()

// 文字方向优化
let mid=(inner+outer)/2
let tx=450+Math.cos(a+step/2)*mid
let ty=450+Math.sin(a+step/2)*mid

let angle=a+step/2
if(angle>Math.PI/2 && angle<Math.PI*1.5){
angle+=Math.PI
}

x.save()
x.translate(tx,ty)
x.rotate(angle+Math.PI/2)
x.textAlign="center"
x.textBaseline="middle"
x.fillText(arr[j]||"",0,0)
x.restore()
}

// 圆环
x.lineWidth = i==0 ? 3 : 1
x.beginPath()
x.arc(450,450,outer,0,Math.PI*2)
x.stroke()

inner=outer
})

x.restore()

// 指针
x.fillStyle="#000"
x.beginPath()
x.moveTo(450,60)
x.lineTo(440,100)
x.lineTo(460,100)
x.fill()

// 角度
let deg=(( -r*180/Math.PI)+360)%360
x.fillStyle="#fff"
x.fillText(deg.toFixed(1)+"°",450,470)
}

draw()

// 存储
function save(){
localStorage.setItem("tool",JSON.stringify(state))
alert("已保存")
}
function load(){
state=JSON.parse(localStorage.getItem("tool"))
buildUI()
}

// 导出
function exportImg(){
let a=document.createElement("a")
a.href=c.toDataURL()
a.download="罗盘.png"
a.click()
}
</script>

</body>
</html>
